name: Deploy Go API to EC2

on:
  push:
    branches: [ "main" ]
    paths:
      - 'twitter-go-api/**'
      - '.github/workflows/deploy-go-api.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-go-api

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. รัน Test
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: twitter-go-api/go.mod

      - name: Run Go tests
        working-directory: twitter-go-api
        run: go test ./...

      # 2. Build & Push Image
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./twitter-go-api
          file: ./twitter-go-api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # 3. Deploy ไปที่ EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /home/ec2-user/app
            
            # ดึง Image ตัวใหม่ล่าสุดมาเตรียมไว้ (จาก GHCR)
            docker compose pull
            
            # สั่งรัน Container ใหม่ พร้อมกวาดล้าง Container ผี
            docker compose up -d --remove-orphans
            
            # ลบ Image เก่าทิ้ง
            docker image prune -f