name: Deploy Spring Boot API to Azure Container Apps

on:
  # push:
  #   branches: 
  #     [ main ]
  #   paths:
  #     - 'twitter-java-api/**'
  #     - '.github/workflows/deploy-java-api.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run Java tests
        working-directory: twitter-java-api
        run: ./mvnw test

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CACHNTWTAPIDEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CACHNTWTAPIDEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CACHNTWTAPIDEV_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/twitter-java-api
          dockerfilePath: Dockerfile
          registryUrl: crchntwtdevsea001.azurecr.io
          registryUsername: ${{ secrets.CACHNTWTAPIDEV_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CACHNTWTAPIDEV_REGISTRY_PASSWORD }}
          containerAppName: ca-chntwt-springboot-dev
          resourceGroup: rg-chntwt-dev-sea
          imageToBuild: crchntwtdevsea001.azurecr.io/ca-chntwt-springboot-dev:${{ github.sha }}
