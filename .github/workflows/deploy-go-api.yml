name: Deploy Go API to EC2

on:
  push:
    branches: [ "main" ]
    paths:
      - 'twitter-go-api/**'
      - '.github/workflows/deploy-go-api.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-go-api

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Run Test
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: twitter-go-api/go.mod

      - name: Run Go tests
        working-directory: twitter-go-api
        run: go test ./...

      # 2. Build & Push Image
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./twitter-go-api
          file: ./twitter-go-api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # 3. Deploy to EC2 via AWS SSM (no SSH key needed)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "echo \"${{ secrets.GHCR_PAT }}\" | docker login ghcr.io -u ${{ github.actor }} --password-stdin",
              "cd /home/ec2-user/app",
              "docker compose pull",
              "docker compose up -d --remove-orphans",
              "docker image prune -f"
            ]' \
            --comment "Deploy Go API via GitHub Actions" \
            --output text